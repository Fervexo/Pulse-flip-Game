name: Generate Web APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # This adds a manual "Run workflow" button in your Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Compile HTML to APK
        uses: darkshredder/web-to-app-action@main # Changed to the active repository
        with:
          build-folder-path: "build/"
          app-name: "My HTML App"
          output-folder-path: "apk/"

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: apk/
